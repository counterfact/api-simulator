openapi: 3.1.0
info:
  title: Counterfact Admin API (reverse engineered)
  version: 1.0.0
  description: |
    Reverse-engineered OpenAPI description of Counterfact's built-in Admin API,
    based on `src/server/web-server/admin-api-middleware.ts`.
servers:
  - url: /
security:
  - bearerAuth: []
  - {}
paths:
  /_counterfact/api/health:
    get:
      summary: Get admin API health
      operationId: getAdminHealth
      responses:
        "200":
          description: Admin API is available.
  /_counterfact/api/contexts:
    get:
      summary: List all known contexts
      operationId: listContexts
      responses:
        "200":
          description: Current contexts grouped by path.
    
  /_counterfact/api/contexts/{path}:
    parameters:
      - in: path
        name: path
        required: true
        schema:
          type: string
        description: |
          Route path whose context should be read/updated.
          Nested paths are represented with slash-delimited values.
    get:
      summary: Get context for a specific route path
      operationId: getContext
      responses:
        "200":
          description: Resolved context for the requested path.
    post:
      summary: Merge updates into a specific route context
      operationId: updateContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Context updated.
        "400":
          description: Body was not a non-array JSON object.

  /_counterfact/api/config:
    get:
      summary: Get active Counterfact runtime configuration
      operationId: getConfig
      responses:
        "200":
          description: Runtime configuration.

  /_counterfact/api/config/proxy:
    get:
      summary: Get proxy configuration
      operationId: getProxyConfig
      responses:
        "200":
          description: Current `proxyUrl` and `proxyPaths` values.
    patch:
      summary: Update proxy configuration
      operationId: updateProxyConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                proxyUrl:
                  type: string
                proxyPaths:
                  type: array
                  items:
                    type: array
                    minItems: 2
                    maxItems: 2
                    prefixItems:
                      - type: string
                      - type: boolean
      responses:
        "200":
          description: Proxy settings updated.
        "400":
          description: Body was not a JSON object.

  /_counterfact/api/routes:
    get:
      summary: List discovered routes and methods
      operationId: listRoutes
      responses:
        "200":
          description: Registered routes in the runtime registry.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
